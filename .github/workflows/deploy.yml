name : ci/cd

on: 
  pull_request:
    branches: ["sprint-mission-11"]
  push:
    branches: ["sprint-mission-11"]

jobs:
  ci:
    runs-on : ubuntu-latest
    steps:
       - name: Checkout branch
         uses: actions/checkout@v3
       
       - name: install node.js
         uses: actions/setup-node@v3
         with:
            node-version: 'lts/*'
            cache: 'npm'
        
       - name: install dependencies
         run: npm ci

       - name: check types
         run: npm run type-check

       - name: check format
         run: npm run format 

      # todo:  check lint

       - name: unit tests
         run: npm test