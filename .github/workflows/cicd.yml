# Github Secrets
# AWS_ACCESS_KEY_ID
# AWS_SECRET_ACCESS_KEY
# AWS_REGION
# ECR_SERVER_URI
# EC2_HOST
# EC2_USERNAME
# EC2_SSH_PRIVATE_KEY
# ENV

name: ci/cd

on:
  pull_request:
    branches: ["정인성-sprint11"]
  push:
    branches: ["main", "정인성-sprint11"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci

      - name: check types
        run: npm run type:check

      - name: check format
        run: npm run format:check
      
      # - name: run unit test
      #   run: npm run test:all
