name: ci/cd

on:
  pull_request:
    branches: ["정인성-sprint11"]
  push:
    branches: ["main", "정인성-sprint11"]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci

      # dotenv-cli 설치
      - run: npm install -g dotenv-cli

      # .env.test 생성
      - run: echo "${{ secrets.ENV_TEST }}" > .env.test

      # Postgres ready 대기
      - run: |
          until pg_isready -h localhost -p 5432; do
            echo "waiting for postgres..."
            sleep 1
          done

      # Prisma 스키마 push
      - run: dotenv -e .env.test -- npx prisma generate
      - run: dotenv -e .env.test -- npx prisma db push

      # 테스트 실행
      - run: dotenv -e .env.test -- npm run test:all
