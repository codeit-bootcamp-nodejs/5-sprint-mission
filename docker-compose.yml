networks:
  codeit-network:
    driver: bridge

volumes:
  certs:
  html:
  vhost:
  acme:
  public:

services:
  server:
    image: ${AWS_ECR_URI}:latest
    restart: always
    networks:
      - codeit-network
    ports:
      - 3000:3000
    env_file: .env.prod
    volumes:
      - ./src/uploads:/server/src/uploads
