networks:
  codeit-network:
    driver: bridge

volumes:
  certs:
  html:
  vhost:
  acme:
  public:

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    restart: always
    networks:
      - codeit-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro

  server:
    image: ${AWS_ECR_URI}:latest
    restart: always
    networks:
      - codeit-network
    ports:
      - 3000:3000
    env_file: .env.prod
    volumes:
      - ./src/uploads:/server/src/uploads
