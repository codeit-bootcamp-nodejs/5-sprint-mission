networks:
  panda-market-network:
    driver: bridge

volumes:
  certs:
  html:
  vhost:
  acme:
  public:
  postgres_data:

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    restart: always
    networks:
      - panda-market-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro

  server:
    depends_on:
      - redis
      - postgres:
          condition: service_healthy
    image: ${SERVER_IMAGE_NAME}
    restart: always
    networks:
      - panda-market-network
    expose:
      - "3000"
    env_file: .env.prod
    environment:
      - VIRTUAL_HOST=54.180.92.17
      - VIRTUAL_PORT=3000
    volumes:
      - public:/server/public

  redis:
    image: redis:alpine
    restart: "always"
    networks:
      - panda-market-network
    expose:
      - "6379"

  postgres:
    image: postgres:15-alpine
    restart: always
    networks:
      - panda-market-network
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-panda_market_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5