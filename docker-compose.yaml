version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: sprint-mission-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-sprint_mission_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sprint-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sprint-mission-app
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-sprint_mission_db}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./public:/app/public
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sprint-network
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  postgres_data:
    driver: local

networks:
  sprint-network:
    driver: bridge
